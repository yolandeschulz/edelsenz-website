gls:
  eyebrow: "Speciality, not commodity"
  h1: "Global &amp; Local Sourcing"
  tag: "Speciality, not commodity — we hunt for new, innovative ingredients and products that give your range an edge."
  lede: "We connect manufacturers to the right ingredients and products — sourced globally and locally through trusted supplier networks. EdelSenz isn’t commodity-driven; we look for speciality, innovative and on-trend ingredients that fit your cost, quality and availability needs."
  serve_h2: "The customers we partner with"
  serve_p: "Food, beverage, personal-care and related manufacturers who need reliable supply — or a more innovative ingredient than the market default."
  value_h2: "Why it works"
  value_p: "We give you access to ingredients, products and suppliers that would otherwise be hard to reach — backed by technical and supply-chain expertise so sourcing decisions hold up commercially."
hss:
  eyebrow: "Sole distributor of Akay"
  h1: "Herbs, Spices &amp; Seasonings"
  tag: "As the sole distributor of Akay, we bring world-class spice extracts and oleoresins to local manufacturers."
  lede: "EdelSenz is the <strong>sole distributor of Akay</strong> — giving South African manufacturers direct access to world-class spice extracts, oleoresins and natural seasoning solutions. Alongside this flagship partnership we develop technical seasonings, heart-healthy blends and custom flavour systems."
  serve_h2: "The customers we partner with"
  serve_p: "Food manufacturers, seasoning houses, FMCG brands and selected distributors."
  value_h2: "Why it works"
  value_p: "You get the reach of a global flavour partner with hands-on local technical support — from concept seasoning through to a compliant, market-ready blend."
  m1_k: "Flagship"
  m1_h: "Akay extracts &amp; oleoresins"
  m1_p: "Concentrated, consistent natural flavour and colour."
  m2_k: "Bespoke"
  m2_h: "Custom seasonings"
  m2_p: "Savoury blends tailored to your product and process."
  m3_k: "Better-for-you"
  m3_h: "Heart-healthy blends"
  m3_p: "Lower-sodium and functional seasoning systems."
mb:
  eyebrow: "Heritage milling, modern bakery, fortification"
  h1: "Milling &amp; Baking"
  tag: "Heritage milling and modern bakery solutions, plus tailored vitamin &amp; mineral premix blends."
  lede: "From farm-harvested to traditionally farm-milled, our Milling &amp; Baking division covers heritage maize milling, modern bakery mixes and the vitamin &amp; mineral premixes used to fortify staples and finished goods."
  serve_h2: "The customers we partner with"
  serve_p: "Bakeries, millers, staple-food producers and brands fortifying their products for better public-health outcomes."
  value_h2: "Why it works"
  value_p: "Locally farmed and milled inputs mean a stable supply, while our technical team handles fortification, formulation and compliance — so quality and nutrition are built in, not bolted on."
  m1_k: "Staple"
  m1_h: "Maize meal"
  m1_p: "Unbleached, roller-mill maize meal."
  m2_k: "Bakery"
  m2_h: "Bakery mixes"
  m2_p: "Mielie bread, flapjack &amp; pancake mixes."
  m3_k: "Fortify"
  m3_h: "V&amp;M premixes"
  m3_p: "Custom vitamin &amp; mineral fortification blends."
pc:
  eyebrow: "Natural skin, body &amp; home"
  h1: "Personal Care"
  tag: "Natural skincare, body and home ranges — formulated, sampled and manufactured under one roof."
  lede: "Our integrated source-develop-manufacture model extends to selected personal care. We formulate, sample and manufacture natural skincare, body and home ranges — with compliant claims and on-trend formats — under one roof."
  serve_h2: "The customers we partner with"
  serve_p: "Retailers, estates and wellness brands wanting natural personal-care and home ranges developed and made locally."
  value_h2: "Why it works"
  value_p: "The same technical, sourcing, formulation and manufacturing partnership that powers our food work — applied to personal care where it fits your brand and customer demand."
  m1_k: "Skin"
  m1_h: "Skincare &amp; body"
  m1_p: "Natural, compliant skin and body formulations."
  m2_k: "Home"
  m2_h: "Hand-crafted home"
  m2_p: "Candles, diffusers and spritzers."
  m3_k: "Hospitality"
  m3_h: "Hotel collection"
  m3_p: "Natural amenity and gifting ranges."
ph:
  eyebrow: "Farm-to-shelf, from the Farm Kitchen Range"
  h1: "Pantry &amp; Home"
  tag: "Farm-to-shelf pantry ranges built from seasonal, locally-sourced ingredients."
  lede: "Made from seasonal farm ingredients, our Pantry &amp; Home division turns estate and farm produce into shelf-ready ranges — the model we built with Boschendal’s Farm Kitchen Range, from savoury and sweet pantry lines to maize, single-farm ingredients and home."
  serve_h2: "The customers we partner with"
  serve_p: "Estates, farm brands and retailers who want a farm-to-shelf range that carries their story and quality."
  value_h2: "Why it works"
  value_p: "We replicate estate SKUs, develop seasonal farm-led products, and handle compliance, labelling and logistics — so you keep brand control while EdelSenz handles operational execution."
  m1_k: "Pantry"
  m1_h: "Farm Kitchen Range"
  m1_p: "Pastas, sauces, preserves, granola &amp; rusks."
  m2_k: "Farm"
  m2_h: "Maize &amp; ingredients"
  m2_p: "Maize meal, mielie bread mix, pecans, olive oil."
  m3_k: "Home"
  m3_h: "Body &amp; Home"
  m3_p: "Candles, diffusers and natural skincare."
fb:
  eyebrow: "Functional beverages, built on our technologies"
  h1: "Food &amp; Beverage"
  tag: "Functional, trend-forward beverages built on our proprietary nutrition technologies."
  lede: "Our Food &amp; Beverage division develops functional, trend-forward drinks — with a particular focus on women’s wellness. From creatine and protein waters to next-generation wellness beverages, products are built on our proprietary nutrition platforms and SA-legislation-aligned claims."
  serve_h2: "The customers we partner with"
  serve_p: "Beverage and wellness brands and retailers looking to launch credible functional drinks, fast."
  value_h2: "Why it works"
  value_p: "Brands build on validated nutrition platforms — NutriSphere, Dairy Alt+, FibrePro and CompleteCore — for faster, science-backed innovation, while we handle development and manufacturing end to end."
  m1_k: "Hero SKU"
  m1_h: "Creatine Water"
  m1_p: "Blood Orange — 3g creatine, no added sugar, vitamin &amp; mineral enriched."
  m2_k: "Functional"
  m2_h: "Protein Waters"
  m2_p: "Light, refreshing functional hydration."
  m3_k: "Women’s wellness"
  m3_h: "Wellness drinks"
  m3_p: "Next-generation, cycle-aware wellness beverages."
