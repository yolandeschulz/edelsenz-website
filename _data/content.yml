approach:
  eyebrow: "From Idea to Shelf"
  h2: ""
  h2a: "One partner for the"
  h2b: "whole"
  h2c: "product journey"
  intro: "Most suppliers do one part of the job. EdelSenz brings developing, importing and manufacturing together — so a single team carries your product from raw concept through functional formulation to a finished, shelf-ready SKU."
  pill1: "recipe and product development led by our chef, PD team and lab."
  pill2: "speciality global &amp; local ingredient sourcing through trusted networks."
  pill3: "blending, co-packing and white-label production, end to end."
