  flow3_title: "White-Label Manufacturing"
  flow3_text: "Manufacturing, blending and co-packing shelf-ready products, delivered to your distribution hub."
story:
  eyebrow: "Our story"
  h2: ""
  h2a: "Built to make a"
  h2b: "difference"
  h2c: "in food"
  p1: "EdelSenz began with a long-held dream. After more than 18 years in corporate executive regional roles — learning what it takes to be globally relevant while delivering local, in-market solutions across Europe, the Middle East and Africa — founder <strong>Yolande Schulz</strong> set out to build a business that would make a real difference in FMCG."
  p2: "Formed in 2025, EdelSenz brought together shareholders and a team of experts who shared one vision: to make a difference in food in Africa, offering customers innovative, competitively priced solutions and products. That ambition still sits at our core."
  edel: "From Edelweiss — honouring our founders&rsquo; European roots and global outlook."
  senz: "From African language roots — built in South Africa, with real local relevance."
quote:
  text: "We know what it takes to operate at a global standard, while remaining locally relevant &mdash; with fit-for-purpose solutions."
  attr: "Yolande Schulz"
  name: "Yolande Schulz"
  role: "Managing Director"
vm:
  eyebrow: "Where we&rsquo;re going"
  h2: ""
  h2a: "Vision &amp;"
  h2b: "mission"
  vision: "To become a trusted integrated innovation and execution partner for food, beverage and selected personal-care businesses — helping customers move from idea to shelf with technical excellence, practical execution and responsible growth."
  mission: "To deliver science-backed, high-quality nutritional, functional and product solutions that improve public health, enhance product performance and support sustainable, traceable supply chains."
values:
  eyebrow: "What we stand for"
  h2: ""
  h2a: "Our core"
  h2b: "values"
  intro: "Six principles that guide how we build, serve, decide and execute — every day."
  v1_title: "Own it"
  v1_text: "We take responsibility for what we commit to — we follow up, close the loop and ask for help early."
  v2_title: "Do the right thing"
  v2_text: "We choose integrity, honesty and responsible business practice — and we never over-promise."
  v3_title: "Stay science-backed"
  v3_text: "We respect technical quality, evidence, formulation logic and regulatory awareness."
  v4_title: "Build practical solutions"
  v4_text: "We focus on solutions customers can actually use — linked to cost, supply and execution."
  v5_title: "Work as one team"
  v5_text: "We share, collaborate across divisions and partners, and never build silos."
  v6_title: "Grow responsibly"
  v6_text: "We build at the right pace, protecting the reputation of EdelSenz, our partners and customers."
video:
  eyebrow: "Idea to shelf"
  h2: "One integrated journey"
  sub: "From farming and milling to development, manufacturing and finished product &mdash; it all comes together at EdelSenz."
divisions:
  eyebrow: "Our group"
  h2: ""
  h2a: "Six"
  h2b: "specialised"
  h2c: "divisions"
  intro: "Deep, category-specific expertise across the food and personal-care landscape — backed by the same integrated team and capabilities."
  d1_desc: "Speciality, not commodity. We seek out new, innovative and speciality ingredients and products through trusted networks at home and around the world."
  d2_desc: "As the <strong>sole distributor of Akay</strong>, we bring world-class spice extracts and oleoresins to local manufacturers — alongside technical seasoning, heart-healthy blends and custom flavour systems."
  d3_desc: "Heritage milling and modern bakery solutions, plus tailored vitamin &amp; mineral premix blends for the fortification of staples and finished goods."
  d4_desc: "Natural skincare, body and home ranges — formulated, sampled and manufactured under one roof, with compliant claims and on-trend formats."
  d5_desc: "Farm-to-shelf pantry ranges: artisanal pastas &amp; sauces, preserves, granola, rusks, maize meal and single-farm ingredients like nuts and cold-pressed oils."
  d6_desc: "Functional, trend-forward beverages built on our proprietary nutrition technologies — from creatine and protein waters to next-generation wellness drinks."
cap:
  eyebrow: "Shared capabilities"
  h2: "One team behind every division"
  intro: "From the first brief to the final SKU, the same in-house experts support each division — so quality, science and compliance stay consistent."
  c1_title: "Development Chef"
  c1_text: "Culinary-led product creation, rooted in real food."
  c2_title: "Sensory Panel"
  c2_text: "Structured tasting and evaluation for market-ready taste."
  c3_title: "Innovation Kitchen &amp; Lab"
  c3_text: "Test kitchen and laboratory under one roof."
  c4_title: "Product Development Team"
  c4_text: "Cross-functional PD from concept to scale-up."
  c5_title: "Technical &amp; Regulatory"
  c5_text: "SA-legislation-aligned labelling, claims and compliance."
  c6_title: "Supply Chain Expertise"
  c6_text: "Logistics, blending and co-packing, end to end."
people:
  eyebrow: "Our people &amp; communities"
  h2: ""
  h2a: "The power is in our"
  h2b: "people"
  intro: "EdelSenz is built by people — and for the communities we serve. From our development kitchen to the farms, partners and producers we work with, our team turns ideas into real products."
impact:
  eyebrow: "Community impact"
  h2: "Food that lifts the communities it comes from"
  intro: "EdelSenz exists to make a real difference in food in Africa — not only on the shelf, but right along the chain that gets it there. We build value where it&rsquo;s grown, made and sold."
  i1_title: "Local sourcing, local livelihoods"
  i1_text: "We prioritise local farmers, producers and suppliers wherever we can — keeping value, skills and jobs inside the communities we work with."
  i2_title: "Skills &amp; artisanal manufacturing"
  i2_text: "Our North West artisanal batch facility develops hands-on food-production skills and small-batch capacity close to source."
  i3_title: "Inclusive, ethical business"
  i3_text: "A majority female-owned, Level&nbsp;1 B-BBEE contributor — committed to ethical sourcing and transparent, long-term partnerships."
